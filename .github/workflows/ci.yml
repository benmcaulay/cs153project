name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Backend tests + eval smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx

      - name: Run test suite
        run: pytest -q

      - name: Evaluation smoke test (no live model required)
        # The offline and baseline engines need no GPU/Ollama, so CI can verify
        # the safety contract end-to-end: 0 fabrications with the runtime down.
        run: |
          python -m eval.run_eval --engine offline --no-write
          python -m eval.run_eval --engine baseline --no-write
          python -m eval.retrieval_recall
